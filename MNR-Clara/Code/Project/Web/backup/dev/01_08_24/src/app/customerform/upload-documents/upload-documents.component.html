<form [formGroup]="form">
    <div class="bg-blue">
        <h1 class="text-white p-5">Upload Documents</h1>
    </div>
    <div class=" ms-3 me-3  px-0 mt-1 ">
        <button mat-raised-button (click)="addRow()" class="mb-3 mx-2 bg-yellow text-white" [disabled]="!enablescreen">
            <i class="bi bi-plus me-1 font-size-1_5rem"></i>
            Add</button>
        <div class="scroll">
            <table mat-table [dataSource]="dataSource" class="col-12 w-100 " formArrayName="formLine">
                <!-- Weight Column -->
                <ng-container matColumnDef="chooseFile">
                    <th mat-header-cell1 *matHeaderCellDef style="background:'#e2edf7';width:80%">Upload File</th>
                    <td mat-cell *matCellDef="let element; let index = index" class="d-flex" [formGroupName]="index">
                        <input mat-raised-button class="form-control w-100 ms-2 " id="formFile" type="file"
                            (change)="this.onFilechange($event, element)" style="width: 80rem !important;" />
                    </td>
                </ng-container>
                <!-- Weight Column -->
                <ng-container matColumnDef="fileName">
                    <th mat-header-cell1 *matHeaderCellDef style="background:'#e2edf7'">File Name</th>
                    <td mat-cell *matCellDef="let element; let index = index" [formGroupName]="index">
                        <mat-form-field class="form-group input_field mb-0 w-100" appearance="outline">
                            <input matInput placeholder="Enter" [disabled]="true" [value]="element.fileName" formControlName="fileName" readonly>
                        </mat-form-field>
                    </td>
                </ng-container>
                <!-- Weight Column -->
                <ng-container matColumnDef="status">
                    <th mat-header-cell1 *matHeaderCellDef style="background:'#e2edf7'">Action</th>
                    <td mat-cell *matCellDef="let element; let index = index" [formGroupName]="index">
                        <button mat-icon-button matTooltip="Download" (click)="download(element)">
                            <mat-icon class="text-primary hvr-wobble-horizontal ml-2">download</mat-icon>
                        </button>

                        <button mat-icon-button matTooltip="Delete" (click)="delete(element, index)">
                            <mat-icon class="text-danger hvr-wobble-horizontal ml-2">delete</mat-icon>
                        </button>

                    </td>
                </ng-container>


                <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;">
                </tr>
            </table>
        </div>

    </div>
    <div class="d-flex justify-content-center align-items-center py-2 bg-white">
        <button mat-raised-button mat-dialog-close class="text-white mr-1 px-4" color="warn">
            <mat-icon class="">close</mat-icon> Cancel
        </button>

        <button mat-raised-button (click)="submit()" [disabled]="!enablescreen" class="mx-2 bg-blue text-white"> <i
                class="bi bi-check2 me-1 font-size-1_5rem"></i>
            Save</button>

    </div>
</form>
