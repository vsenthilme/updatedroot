
    <div class="card bg-white " style="overflow-x: hidden;">
        <div mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
          class="d-flex justify-content-between align-items-center header_colour text-white p-2">
          <h2 class="my-auto headertext">Uploaded Files</h2>
          <i mat-dialog-close class="bi bi-x-lg px-3"></i>
        </div>
        <div class=" my-0 py-0 ">
          <div class="scroll">
            <table mat-table [dataSource]="dataSource" class="col-12 px-3 w-100">
    
              <!-- Weight Column -->
              <ng-container matColumnDef="fileName">
                <th mat-header-cell *matHeaderCellDef>File Name</th>
                <td mat-cell *matCellDef="let element; let index = index" >{{element.fileName}}</td>
              </ng-container>
              <!-- Weight Column -->
              <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>Action</th>
                <td mat-cell *matCellDef="let element; let index = index" >
                  <button mat-icon-button matTooltip="Download" (click)="download(element)" >
                    <mat-icon class="text-primary hvr-wobble-horizontal ml-2">download</mat-icon>
                  </button>   
                </td>
              </ng-container>
    
       
              <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;">
              </tr>
            </table>
          </div>
        </div>
        <div class="d-flex justify-content-center align-items-center py-2 bg-white">
          <button mat-raised-button mat-dialog-closeclass="text-white mr-1 px-4" color="warn">
            <mat-icon class="">close</mat-icon> Cancel
          </button>
           
        </div>
      
      </div>
