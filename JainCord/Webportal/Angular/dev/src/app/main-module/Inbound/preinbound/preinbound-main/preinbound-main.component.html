<div class="row mx-1 pl-2">
  <div class="col-12">
    <!--inner header-->

    <div class="row  text-secondary pr-0 mt-1">
      <div class="col bg-white d-flex align-items-center mt-1 px-1 py-1 pathname">


        <nav aria-label="breadcrumb" class="d-flex align-items-center">
          <ol class="breadcrumb mb-0 bg-white d-flex align-items-center">
            <li class="breadcrumb-item whs-fontsize-1-2rem  my-auto"><a routerLink="/main/dashboard/landingPage">Home</a></li>
            <li class="breadcrumb-item" class=" whs-fontsize-1-2rem  my-auto"><a
                routerLink="/main/inbound/container-receipt">Inbound</a></li>
            <li class="breadcrumb-item whs-fontsize-1-2rem  my-auto">Preinbound</li>
          </ol>
        </nav>



        <div class="d-flex ml-auto my-auto">
          <div [hidden]="isShowDiv"> <input matInput
              class="form-control filter_button mt-2 mt-2 mx-2 border-bottom" placeholder="Search" style="width:90%">
          </div>
          <div [ngClass]="showFloatingButtons == true ? 'floating-pane-active' : 'floating-pane-deactive'"
            class="button-row d-flex align-items-center">
            <!--
                    <button mat-mini-fab *ngIf="showFloatingButtons == true" class="floating-buttons  d-flex align-items-center justify-content-center bg-pink text-white mx-2"
                    matTooltip="Add">
                    <mat-icon class="action-icon d-flex align-items-center justify-content-center">add_circle_outline</mat-icon>
                  </button>
                  -->
            <button mat-mini-fab *ngIf="showFloatingButtons == true" (click)="openDialogHeader('Display')"
              class=" floating-buttons  d-flex align-items-center justify-content-center text-white   yellowaction"
              matTooltip="Display" [disabled]="!RA.view">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">search</mat-icon>
            </button>
            <button mat-mini-fab *ngIf="showFloatingButtons == true" (click)="openDialogHeader('Edit')"
              class="floating-buttons  d-flex align-items-center justify-content-center text-white  blueaction "
              matTooltip="Edit"  [disabled]="!RA.createUpdate" >
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">edit</mat-icon>
            </button>
            <button mat-mini-fab *ngIf="showFloatingButtons == true" (click)="deleteDialog()" 
              class=" floating-buttons  d-flex align-items-center justify-content-center redaction text-white  align-middle"
              matTooltip="Delete"  [disabled]="!RA.delete" >
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">delete</mat-icon>
            </button>
            <!-- 
                    <button  mat-mini-fab *ngIf="showFloatingButtons == true"
                  class="floating-buttons  d-flex align-items-center justify-content-center text-white  bg-success  " matTooltip="Info">
                  <mat-icon class="action-icon d-flex align-items-center justify-content-center">info_outline</mat-icon>
                </button>
                  -->
            <button mat-mini-fab *ngIf="showFloatingButtons == true" (click)="downloadexcel()"
              class="floating-buttons  d-flex align-items-center justify-content-center text-white  darkblueaction "
              matTooltip="Download">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">download</mat-icon>
            </button>


            <button mat-mini-fab (click)="toggleFloat()" class="mx-2 text-white action-button"
              [ngClass]="{'bg-orange' : toggle, 'purple': !toggle}">
              <mat-icon>{{icon}}</mat-icon>Options
            </button>
           <button mat-mini-fab   [matMenuTriggerFor]="templateChoose"
              class=" floating-buttons1 d-flex align-items-center justify-content-center darkaction text-white mx-2 mr-3 align-middle"
              matTooltip="New" > <!--(click)="preInboundUpload()"-->
              <mat-icon class="action-icon d-flex align-items-center justify-content-center my-auto">add</mat-icon>
            </button> 
            <button mat-mini-fab (click)="openOrderSatus()"
              class=" floating-buttons1  d-flex align-items-center justify-content-center greyaction text-white mx-2 mr-3 align-middle"
              matTooltip="Order Status">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center my-auto">description</mat-icon>
            </button>
            <button mat-mini-fab class="text-white mx-2 action-button  bg-red" type="button" (click)="drawer.toggle()"
              mat-button>
              <mat-icon class="">tune</mat-icon> Filter
            </button>
          </div>

        </div>
      </div>
    </div>
    <!--main-section-tabbar-->
    <!--      <app-main-section-tabbar>
    </app-main-section-tabbar> -->
  </div>
  <!--main section-->
  <div class="pr-1 mt-2 mx-0 w-100 ">
    <app-inbound-tabbar></app-inbound-tabbar>
  </div>

  <mat-drawer-container class="example-container  w-100 animate__animated animate__fadeInRight animate__faster">
    <mat-drawer #drawer class="example-sidenav " mode="over" position="end">
      <div class="card-header whs-bg-grey text-white d-flex justify-content-between align-items-center">
        <h6 class="my-auto mb-0">Search Parameter</h6>
        <mat-icon type="button" (click)="drawer.toggle()">close</mat-icon>
      </div>
      <form [formGroup]="searhform">
        <div class="row searchscroll mt-1 mr-1 p-2 pl-3">
          <!-- <div class="col-12 pr-0">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Warehouse No</label>
              <mat-form-field class="mb-0 w-100 " appearance="outline">
                <input matInput placeholder="Enter" formControlName="warehouseId">
              </mat-form-field>
            </div>
          </div> -->
          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Container No</label>
              <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings" [data]="containerNoList"
                [(ngModel)]="containerNoListselected" [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown>
            </div>
          </div>
          <div class="col-12 pr-0">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Inbound Type </label>
              <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings"
                [data]="inboundOrderTypeList" [(ngModel)]="inboundOrderTypeListselected"
                [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown>
            </div>
          </div>
          <div class="col-12 pr-0">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Order No </label>
              <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings"
                [data]="refDocNumberList" [(ngModel)]="refDocNumberListselected"
                [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown>
            </div>
          </div>
        
          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Status</label>
              <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings" [data]="statusIdList"
                [(ngModel)]="statusIdListselected" [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown>
            </div>
          </div>
          <div class="col-12 mt-2">
            <p class="mb-0 py-0">Created Date</p>
            <mat-form-field class="form-group input_field mb-0 w-100" appearance="outline">
             
              <mat-date-range-input [rangePicker]="pickerss">
                <input matStartDate placeholder="Start date" formControlName="startCreatedOn">
                <input matEndDate placeholder="End date" formControlName="endCreatedOn">
              </mat-date-range-input>
              <mat-datepicker-toggle matSuffix [for]="pickerss"></mat-datepicker-toggle>
              <mat-date-range-picker #pickerss></mat-date-range-picker>
            </mat-form-field>

          </div>
          <!-- <div class="col-12 mt-2">
            <p class="mb-0 py-0">Confirmed Date</p>
            <mat-form-field class="form-group input_field mb-0 w-100" appearance="outline">
             
              <mat-date-range-input [rangePicker]="pickerss">
                <input matStartDate placeholder="Start date" formControlName="startConfirmedOn">
                <input matEndDate placeholder="End date" formControlName="endConfirmedOn">
              </mat-date-range-input>
              <mat-datepicker-toggle matSuffix [for]="pickerss"></mat-datepicker-toggle>
              <mat-date-range-picker #pickerss></mat-date-range-picker>
            </mat-form-field>

          </div> -->
        </div>
      </form>
      <div class="d-flex justify-content-center align-items-center py-2">
        <button mat-raised-button color="warn" class="text-white mx-1 px-4" (click)="reload()" (click)="reload();">
          <mat-icon class="">restart_alt</mat-icon> Reset
        </button>
        <button mat-raised-button class="bg-darkblue text-white mx-1" (click)="search(); drawer.toggle();">
          <mat-icon class="">done</mat-icon> Search
        </button>
      </div>
    </mat-drawer>
    <div class="example-sidenav-content">
        <!-- <div class="row "style="padding-right: 15px !important;"> -->
          <div class="row " style="padding-right: 15px !important;">
            <p-table #preInboundTag [columns]="cols" [value]="preInbound"
            styleClass="p-datatable-gridlines p-datatable-sm" [scrollable]="true"selectionMode="single"
            scrollHeight="calc(100vh - 14.8rem)" [paginator]="true"  sortField="refDocDate" [sortOrder]="-1" [rows]="100" [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [resizableColumns]="true"
            tableStyle="width: 100%;margin-left: 10px;background-color:white">
            <ng-template pTemplate="header" let-columns>
              <tr>
                <th style="max-width: 3.5rem; justify-content: center;">
                  <p-tableHeaderCheckbox class="pl-3" [disabled]="true"></p-tableHeaderCheckbox>
                </th>
                <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                  {{ col.header }}
                  <p-sortIcon [field]="col.field"></p-sortIcon>
                </th>
              </tr>
              <tr>
                <th style="max-width: 3.5rem; justify-content: center;">
                    <p-tableHeaderCheckbox class="pl-3"
                        [disabled]="true"></p-tableHeaderCheckbox>
                </th>
                <th *ngFor="let col of columns">
                  <ng-container *ngIf="col.format != 'date'; else otherTemplate">
                    <input pInputText type="text"
                      (input)="preInboundTag.filter($any($event.target)?.value, col.field, 'contains')"
                      [value]="$any(preInboundTag.filters[col.field])?.value" placeholder="Search"
                      class=" w-100 p-column-filter"> </ng-container>
                  <ng-template #otherTemplate>
                    <input pInputText type="date"
                      (input)="preInboundTag.filter($any($event.target)?.value, col.field, 'contains')"
                      [value]="$any(preInboundTag.filters[col.field])?.value" placeholder="Search"
                      class=" w-100 p-column-filter">
                  </ng-template>
            </tr>
            </ng-template>
            <ng-template pTemplate="body" let-rowData let-columns="columns" let-rowIndex="rowIndex">
              <tr>
                <td style="max-width: 3.5rem; justify-content: center;">
                  <p-checkbox (onChange)="onChange()" [(ngModel)]="selectedPreinbound" class="pl-3"
                    [value]="rowData"></p-checkbox>
                </td> 
                <td *ngFor="let col of columns">
                  <ng-container *ngIf="col.format == 'normal'; else otherTemplate">
                    {{ rowData[col.field] }}
                  </ng-container>
                  <ng-template #otherTemplate>
                    <span *ngIf="col.format == 'action'"> <button mat-icon-button [matMenuTriggerFor]="menu" [matMenuTriggerData]="{preInbound: rowData}">
                      <mat-icon class="text-secondary">more_horiz</mat-icon>
                    </button></span>
                    <span *ngIf="col.format == 'link' "style="text-decoration-line: underline;" class="text-primary"
                      (click)="openDialog('LineEdit', rowData);">{{rowData.refDocNumber}}</span>
                   <span *ngIf="col.format == 'date'">{{ rowData[col.field] | date : 'dd-MM-yyyy HH:mm' }}</span>
                   <span *ngIf="col.format == 'details' && this.auth.userTypeId == 1"  style="width: 8rem;"(click)="openDialogView(preInbound)"><mat-icon>code</mat-icon></span>

                  </ng-template>
                </td>
              </tr>
            </ng-template>
          </p-table>
  
      </div>
    </div>
  </mat-drawer-container>

  
  <input type="file" #fileInput style="display:none" (change)="onFileSelected($event)" />
  <mat-menu #menu="matMenu">
    <ng-template matMenuContent let-aliasMenuItems="preInbound">
      <button mat-menu-item (click)="showSuccess()">Process ASN</button>
      <button mat-menu-item (click)="cancel(aliasMenuItems)" [disabled]="(aliasMenuItems.inboundOrderTypeId != 1 && aliasMenuItems.statusId == 24 )">Replace</button>
    </ng-template>
  </mat-menu>

  <mat-menu #templateChoose="matMenu" >
    <button mat-menu-item [matMenuTriggerFor]="createManual">Create</button>
    <button mat-menu-item [matMenuTriggerFor]="uploadTemplate">Upload</button>
    <button mat-menu-item [matMenuTriggerFor]="downloadTemplate">Download</button>
  </mat-menu>

  <mat-menu #createManual="matMenu" >
    <button mat-menu-item routerLink="/main/inbound/preInboundrm">RM Inbound</button>
    <button mat-menu-item routerLink="/main/inbound/preInboundCreate">Supplier Invoice</button>
    <button mat-menu-item routerLink="/main/inbound/b2bCreate">NonWms To Wms</button>
    <button mat-menu-item routerLink="/main/inbound/inhouseTransfer">Wms To Wms</button>
    <button mat-menu-item routerLink="/main/inbound/soOrder">Sales-Return</button>
    <button mat-menu-item routerLink="/main/inbound/stockreciept">Direct Receipt</button>
  </mat-menu>

  <mat-menu #uploadTemplate="matMenu" >
    <!-- <button mat-menu-item (click)="setContextAndClick('asn')">RM Inbound</button> -->
    <button mat-menu-item (click)="setContextAndClick('1')">Supplier Invoice</button>
    <!-- <button mat-menu-item (click)="setContextAndClick('interWarehouseTransferIn')">NonWms To Wms</button>
    <button mat-menu-item (click)="setContextAndClick('interWarehouseTransferIn')">Wms To Wms</button>
    <button mat-menu-item routerLink="/main/inbound/soOrder">Sales-Return</button>
    <button mat-menu-item (click)="setContextAndClick('asn')">Direct Receipt</button> -->
  </mat-menu>

  <mat-menu #downloadTemplate="matMenu" >
    <button mat-menu-item (click)="download('RMINBOUND')">RM Inbound</button>
    <button mat-menu-item (click)="download('SUPPLIERINVOICE')">Supplier Invoice</button>
    <button mat-menu-item routerLink="/main/inbound/b2bCreate">NonWms To Wms</button>
    <button mat-menu-item routerLink="/main/inbound/inhouseTransfer">Wms To Wms</button>
    <button mat-menu-item routerLink="/main/inbound/soOrder">Sales-Return</button>
    <button mat-menu-item routerLink="/main/inbound/stockreciept">Direct Receipt</button>
  </mat-menu>
</div>
