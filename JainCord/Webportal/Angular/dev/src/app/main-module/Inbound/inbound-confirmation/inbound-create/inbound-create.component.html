    <!--main section-->
    <div class="row pr-1 mt-1">
      <div class="tabbar1 uatwhite px-0 uatwhite my-auto col d-flex align-items-center">
        <h5 class="my-auto mb-0 mx-4 font-weight-bold whs-text-grey">Order No - {{code.refDocNumber}}</h5>
      </div>
    </div>
    <div class="row mt-2">
      <p-table #inboundTag [columns]="cols" [value]="inbound" styleClass="p-datatable-gridlines p-datatable-sm"
      [scrollable]="true" selectionMode="single"
      [tableStyle]="{'width': '110rem'}" scrollHeight="calc(100vh - 18.2rem)" [paginator]="true" [rows]="100"
      [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [resizableColumns]="true" style="width: 100%;background-color:white">

      <ng-template pTemplate="header" let-columns>
        <tr>
          <th style="max-width: 3.5rem; justify-content: center;">
            <p-tableHeaderCheckbox class="pl-3" [disabled]="true"></p-tableHeaderCheckbox>
          </th>
          <th *ngFor="let col of columns" [pSortableColumn]="col.field">
            {{ col.header }}
            <p-sortIcon [field]="col.field"></p-sortIcon>
          </th>
        </tr>
        <tr>
          <th style="max-width: 3.5rem; justify-content: center;">
              <p-tableHeaderCheckbox class="pl-3"
                  [disabled]="true"></p-tableHeaderCheckbox>
          </th>
          <th *ngFor="let col of columns">
              <input pInputText type="text"
                  (input)="inboundTag.filter($any($event.target)?.value, col.field, 'contains')"
                  [value]="$any(inboundTag.filters[col.field])?.value"
                  placeholder="Search" class=" w-100 p-column-filter">
          </th>
      </tr>
      </ng-template>
      <ng-template pTemplate="body" let-rowData let-columns="columns" let-rowIndex="rowIndex">
        <tr>
          <td style="max-width: 3.5rem; justify-content: center;">
            <p-checkbox (onChange)="onChange()" [(ngModel)]="selectedinbound" class="pl-3"
              [value]="rowData"></p-checkbox>
          </td>
          <td *ngFor="let col of columns">
            <ng-container *ngIf="col.format == 'normal'; else otherTemplate">
              {{ rowData[col.field] }}
            </ng-container>
            <ng-template #otherTemplate>
             <span class="bg-Green" *ngIf="col.format == 'checkbox'"><p-checkbox [disabled]="rowData.statusId == 24" (onChange)="confirmPartial($event,rowData , rowIndex)" name="groupname" value="rowData.referenceField2" [binary]="true" [(ngModel)]="rowData.referenceField2"></p-checkbox></span>
                <span *ngIf="col.format == 'remark'"><button mat-icon-button (click)="remarks(rowData)">
                  <mat-icon class="text-info">edit</mat-icon>
                </button></span>
                <span *ngIf="col.format == 'putaway'"><button mat-icon-button (click)="putaway(rowData)">
                  <mat-icon class="text-secondary">open_in_new</mat-icon>
                </button></span>
            </ng-template>
          </td>
        </tr>
      </ng-template>
    </p-table>
</div>
  </div>
  <div class=" pb-1 w-100 d-flex justify-content-center">
    <div class=" py-2">
      <button mat-raised-button class="text-white mx-1 px-4" color="warn" (click)="cancel()">
        <mat-icon class="">close</mat-icon>Cancel
      </button>
      <button mat-raised-button class="bg-orange px-3 text-white mx-1" (click)="updateInboundLine()"
        *ngIf="pageflow != 'Display'">
        <mat-icon class="">done</mat-icon> Confirm
      </button>
