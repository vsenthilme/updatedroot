
  <div class="row m-4">

    <div class="col-3  mx-0 px-1" *ngFor="let element of barcodeValueList">
      <div class="card my-2">
        <div class="row w-100 mx-2">
          <div class="col-4 my-auto">
            <div class="d-flex flex-column">
              <mat-label class="lablepadding labelvalue">Mfg: {{element.manufacturerName}}</mat-label>
            </div>
          </div>
          <div class="col-8 d-flex justify-content-end">
            <img  src="./assets/jaincord/logo.jpg" /> 
          </div>
          <div class="col-12 my-1  d-flex justify-content-start">
            <div class="d-flex flex-column">
              <div class="d-flex justify-content-start">
                <mat-label class="lablepadding labelvalue mb-1">Part No: {{element.itemCode}}</mat-label> <!--{{element.qty}}-->
              </div>
              <mat-label class="lablepadding labelvalue">Desc: {{element.itemDescription}}</mat-label>
            </div>
          </div>
        </div>
        <div class="row mx-1">
            <qr-code [value]="element.partner_item_barcode" [size]="60"></qr-code>
          
          <div class="col-5 my-1 d-flex justify-content-start">
            <mat-label class="lablepadding labelvalue mr-2 text-right">Qty: {{element.totalLabel}}</mat-label>
          </div>
        </div>
      </div>
    </div>
  
  </div>



<div class="d-flex w-100 bg-white justify-content-between align-items-center pt-2  bottombutton" style="position: fixed!important;">

  <p class="mb-0 float-right invisible">Total Labels: {{this.barcodeValueList.length}}</p> 
  <button mat-raised-button class="text-white mx-1 px-4" color="warn" (click)="back()">
    <mat-icon class="">close</mat-icon>Cancel
  </button>
  <p class="mb-0 mr-3 font-weigt-bold">Total Labels: {{this.barcodeValueList.length}}</p>

</div>
