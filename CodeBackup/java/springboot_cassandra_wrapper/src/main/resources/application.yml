spring:
  data:
    cassandra:
      port: 9042
      contact-points: cassandra
      keyspace-name: store
      schema-action: create_if_not_exists
      entity-base-package: com.example.cassandra.springboot.model
      request:
        timeout:  10s
      connection:
        connect-timeout:  10s
        init-query-timeout: 10s