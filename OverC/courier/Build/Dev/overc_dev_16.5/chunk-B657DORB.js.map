<div class="componentBody">
    <div class="d-flex justify-content-between align-items-center">
        <p class="componentHeader f600 mb-0">{{pageFlow}}</p>
        <div class="d-flex justify-content-between align-items-center">
            <img type="button" src="./assets/common/edit.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button" (click)="downloadExcel()" src="./assets/common/download.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button" src="./assets/common/deletetool.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button"src="./assets/common/settings.png" alt="" srcset=""
                style="margin-left: 19px; margin-right: 28px; height: 1.5rem;">
            <button type="button" disabled class="btn ml-2 addNewbuttom bgBlack text-white" ><i
                    class="bi bi-plus-square pr-2"></i> Add New</button>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center"
        style="margin-bottom: 1.1rem !important;margin-top: 0.8rem;">
        <div class="d-flex justify-content-end align-items-center">
            <p-iconField iconPosition="right">
                <p-inputIcon type="button" (click)="inventoryScanningReport.toggle($event)" styleClass="pi pi-filter" />
                <input type="text" id="toolInput1"  pInputText appTrim  placeholder="Advance filter"
                    (input)="ccrTag.filterGlobal($any($event.target).value, 'contains')" />
            </p-iconField>

            <p-overlayPanel [dismissable]="false" appendTo="body" [style]="{ width: '80vw'}"
                [styleClass]="'custom-overlay-panel'" #inventoryScanningReport>
                <form [formGroup]="form" style="padding: 2rem;">
                    <div class="row">
                        <div class="col-3 mb-3 borderRadius12">
                            <p class="formControlLabel f600 textBlack mb-0">Partner MAWB</p>
                            <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="masterAirwayBillDropdown"
                                formControlName="partnerMasterAirwayBill" appendTo="body" [style]="{'width': '100%'}"
                                [panelStyle]="{'width':'100%'}" />
                        </div>
                        <div class="col-3 mb-3 borderRadius12">
                            <p class="formControlLabel f600 textBlack mb-0">Partner HAWB</p>
                            <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="houseAirwayBillDropdown"
                                formControlName="partnerHouseAirwayBill" appendTo="body" [style]="{'width': '100%'}"
                                [panelStyle]="{'width':'100%'}" />
                        </div>
                        
                        <div class="col-3 marginFieldNew borderRadius12">
                            <p class="formControlLabel f600 textBlack mb-0">Date</p>
                            <p-calendar  dateFormat="dd/mm/yy" formControlName="hawbTimeStamp" appendTo="body"
                                class=" w-100 small-calendar" placeholder="Select Date" [iconDisplay]="'input'"
                                [showIcon]="true" />
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <div>
                            <img type="button" (click)="reset()" src="./assets/common/reset.png" alt="" srcset="">
                        </div>
                        <div>
                            <button class="buttom1 textBlack mx-1" (click)="closeOverLay()">Cancel</button>
                            <button class="buttom1 bgBlack text-white mx-1" (click)="search()">Apply</button>
                        </div>
                    </div>
                </form>
            </p-overlayPanel>

            <p-chips (onRemove)="chipClear($event)" [(ngModel)]="fieldsWithValue" class="inputborderLess" />
        </div>
    </div>

    <div class="tableProperties">
        <p-table #ccrTag [columns]="cols" [value]="customsCaltulationTable" class="custom-table" [scrollable]="true"
            selectionMode="multiple" sortField="createdOn" [sortOrder]="-1" [(selection)]="selectedConsole"
            scrollHeight="calc(100vh - 23rem)" sortField="createdOn" [sortOrder]="-1" [paginator]="true"
            [rows]="100" [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
            [tableStyle]="tableStyle" styleClass="p-datatable-sm">
            <ng-template pTemplate="header" let-columns>
                <tr>
                    <th style="width: 5rem;" pFrozenColumn>
                        <p-tableHeaderCheckbox class="pl-3"></p-tableHeaderCheckbox>
                    </th>
                    <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                        {{ col.header }} <p-sortIcon [field]="col.field" />
                    </th>
                    <!-- <th style="width: 5rem;" pFrozenColumn alignFrozen="right">
                        Actions
                    </th> -->
                </tr>
                <tr>
                    <th style="width: 5rem;" pFrozenColumn>
                        <p-tableHeaderCheckbox [disabled]="true" class="pl-3"></p-tableHeaderCheckbox>
                    </th>
                    <th *ngFor="let col of columns">
                        <input  pInputText appTrim  type="text"
                            (input)="ccrTag.filter($any($event.target)?.value, col.field, 'contains')"
                            [value]="$any(ccrTag.filters[col.field])?.value" placeholder="Search"
                            class="p-column-filter">
                    </th>
                    <!-- <th style="width: 5rem;" pFrozenColumn alignFrozen="right">
                    </th> -->
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-rowData let-columns="columns" let-expanded="expanded">
                <tr [class.selectedRow]="selectedConsole[0] === rowData">
                <tr [ngClass]="{'selectedRow': isSelected(rowData)}">
                    <td style="width: 5rem; justify-content: center;">
                        <p-tableCheckbox class="pl-3" [value]="rowData" />
                    </td>
                    <!-- <td style="width: 5rem; justify-content: center;">
                        <i style="font-size: 14px;" [pRowToggler]="rowData"
                            [ngClass]="expanded ?  'bi-chevron-up' : 'bi-chevron-right'"></i>
                    </td> -->
                    <td *ngFor="let col of columns" [style]="col.style">
                        <ng-container *ngIf="col.format !== 'date' && col.format !== 'hyperLink'; else dateTemplate">
                            {{ rowData[col.field] }}
                        </ng-container>
                        <ng-template #dateTemplate>
                            <span *ngIf="col.format == 'hyperLink'" (click)="openEdit('Edit', rowData)" style="cursor:pointer"
                                class="textOrange font-weight-bold hvr-underline-from-center">{{ rowData[col.field] }}</span>
                            <span *ngIf="col.format == 'date'">{{ rowData[col.field] | date: 'dd-MM-yyyy HH:mm'}}</span>
                        </ng-template>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td [attr.colspan]="4">
                        <p class="my-2 w-100 pl-3">No records found</p>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>


<mat-menu #menu="matMenu" class="customClass">
    <ng-template matMenuContent let-aliasMenuItems="delivery">
        <button mat-menu-item>Edit</button>
        <button mat-menu-item>Confirm</button>
    </ng-template>
</mat-menu>
