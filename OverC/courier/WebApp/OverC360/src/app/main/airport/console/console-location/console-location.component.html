<div class="componentBody">
    <div class="d-flex justify-content-between align-items-center">
        <p class="componentHeader f600 mb-0">Console </p>
        <div class="d-flex justify-content-between align-items-center">
            <img type="button"  src="./assets/common/edit.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button"  src="./assets/common/download.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button"  src="./assets/common/deletetool.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button" (click)="op.toggle($event)"  src="./assets/common/settings.png" alt="" srcset=""
                style="margin-left: 19px; margin-right: 28px; height: 1.5rem;">
                <p-overlayPanel [style]="{ width: '180' }" #op>
                    <button style="width: 8rem;" mat-menu-item class="w-100" (click)="createLocation(); op.hide()"><img
                        src="./assets/common/add.png" style="padding-right: 10px;width: 2rem;" srcset="">Location
                    </button>
                    <button style="width: 8rem;" mat-menu-item class="w-100" (click)="saveCCR(); op.hide()"><img
                        src="./assets/common/add.png" style="padding-right: 10px;width: 2rem;" srcset="">Create CCR
                </button>
                </p-overlayPanel>
            <button type="button" class="btn ml-2 addNewbuttom bgBlack text-white"><i
                    class="bi bi-plus-square pr-2"></i> Add New</button>
        </div>
    </div>

    <div class="d-flex justify-content-start align-items-center"
        style="margin-bottom: 1.1rem !important;margin-top: 0.8rem;">
        <p-iconField iconPosition="right" class="mr-2">
            <p-inputIcon type="button"  styleClass="pi pi-filter" />
            <input type="text" id="toolInput1"  pInputText appTrim  placeholder="Advance filter"
                (input)="ConsoleTag.filterGlobal($any($event.target).value, 'contains')" />
        </p-iconField>
        <p-chips   class="inputborderLess" />
    </div>

    <div class="tableProperties">
        <p-table #ConsoleTag [columns]="cols" [value]="consoleTable" class="custom-table" [scrollable]="true"
            selectionMode="multiple" scrollHeight="calc(100vh - 20.8rem)" [paginator]="true" [rows]="100"
            [showCurrentPageReport]="true" sortField="createdOn" [sortOrder]="-1" [(selection)]="selectedConsole"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" styleClass="p-datatable-sm">
            <ng-template pTemplate="header" let-columns>
                <tr>
                    <th style="width: 5rem;" pFrozenColumn>
                        <p-tableHeaderCheckbox class="pl-3" ></p-tableHeaderCheckbox>
                    </th>
                    <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                        {{ col.header }} <p-sortIcon [field]="col.field" />
                    </th>
                </tr>
                <tr>
                    <th style="width: 5rem;" pFrozenColumn>
                        <p-tableHeaderCheckbox class="pl-3" [disabled]="true"></p-tableHeaderCheckbox>
                    </th>
                    <th *ngFor="let col of columns">
                        <input  pInputText appTrim  type="text"
                            (input)="ConsoleTag.filter($any($event.target)?.value, col.field, 'contains')"
                            [value]="$any(ConsoleTag.filters[col.field])?.value" placeholder="Search"
                            class="p-column-filter">
                    </th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-rowData let-columns="columns">
                <tr [class.selectedRow]="selectedConsole[0] === rowData">
                    <td style="width: 5rem; justify-content: center;" pFrozenColumn>
                        <p-tableCheckbox class="pl-3"
                            [value]="rowData"></p-tableCheckbox>
                    </td>
                    <td *ngFor="let col of columns" [style]="col.style">
                        <ng-container *ngIf="col.format !== 'date' && col.format !== 'hyperLink'; else dateTemplate">
                            {{ rowData[col.field] }}
                        </ng-container>
                        <ng-template #dateTemplate>
                            <span *ngIf="col.format == 'hyperLink'" (click)="openEdit('Edit', rowData)" style="cursor:pointer"
                                class="textOrange font-weight-bold hvr-underline-from-center">{{ rowData[col.field] }}</span>
                            <span *ngIf="col.format == 'date'">{{ rowData[col.field] | date: 'dd-MM-yyyy HH:mm'}}</span>
                        </ng-template>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td [attr.colspan]="4">
                        <p class="my-2 w-100 pl-3">No records found</p>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
<div class="d-flex mt-1 justify-content-end" style="position: absolute; right: 50%; bottom: 7%;">
    <button class="buttom1 textBlack mx-1" (click)="back()">Cancel</button>
    <!-- <button class="buttom1 bgBlack text-white mx-1" (click)="saveCCR()">CCR</button> -->
</div>


<mat-menu #menu="matMenu" class="customClass">
    <ng-template matMenuContent let-aliasMenuItems="delivery">
        <button mat-menu-item>Edit</button>
        <button mat-menu-item>Confirm</button>
    </ng-template>
</mat-menu>
