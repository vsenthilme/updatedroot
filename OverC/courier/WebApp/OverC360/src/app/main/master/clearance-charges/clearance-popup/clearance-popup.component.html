<div class="bgWhite text-black w-93 h-100 m-4 mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <p class="componentHeader f600 mb-0">Add Clearance Charge</p>
    </div>
    <div class="mt-4 pt-2">
        <form [formGroup]="form">
            <div class="d-flex-row">
                <div class="row ">
                    <div class="col-6 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">No of Shipment From</p>
                        <input maxlength="50"  pInputText appTrim  formControlName="noOfShipmentsFrom" class="w-100"  pInputText appTrim 
                            placeholder="Enter" />
                    </div>
                    <div class="col-6 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">No of Shipment To</p>
                        <input maxlength="50"  pInputText appTrim  formControlName="noOfShipmentsTo" class="w-100"  pInputText appTrim 
                            placeholder="Enter" />
                    </div>
                    <div class="col-6 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Standard Charges</p>
                        <input maxlength="50"  pInputText appTrim  formControlName="clearanceCharges" class="w-100"  pInputText appTrim 
                            placeholder="Enter" />
                    </div>
                    <div class="col-6 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Rate Parameter</p>
                        <p-dropdown [showClear]="true"  placeholder="Select" [options]="parameterList" formControlName="parameters" appendTo="body"
                        [style]="{'width': '100%'}"  (onChange)="calculateFormula($event, 'rate')" [disabled]="true" [panelStyle]="{'width':'100%'}" >
                        <ng-template pTemplate="filter"><input type="text"  pInputText appTrim  appTrim
                            placeholder="Search" /></ng-template></p-dropdown>
                    </div>
                    <div class="col-12 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Formula</p>
                        <input maxlength="50"  pInputText appTrim  formControlName="formulaField1" class="w-100"  pInputText appTrim 
                            placeholder="Enter" />
                    </div>
                </div>
                <div class="d-flex float-right py-2">
                    <button mat-dialog-close class="buttom1 textBlack mx-1">Cancel</button>
                    <button type="button" class="buttom1 bgBlack text-white mx-1" (click)="save()">Save</button>
                </div>
            </div>
        </form>
    </div>
</div>
