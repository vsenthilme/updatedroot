<div class="componentBody">
    <div class="d-flex justify-content-between align-items-center">
        <p class="componentHeader f600 mb-0">Customs Costing</p>
        <div class="d-flex justify-content-between align-items-center">
            <img type="button" (click)="downloadExcel()" src="./assets/common/download.png" alt="" srcset=""
            style="margin: 0 17px; height: 1.5rem;">
            <img type="button" (click)="reset()" src="./assets/common/Restart.png" alt="" srcset=""
            style="margin: 0 17px; height: 1.5rem;">
            <button type="button" class="btn ml-2 addNewbuttom bgBlack text-white" (click)="execute()"><i
                    class="bi bi-check2 pr-2"></i>Execute</button>
        </div>
    </div>

    <div class="mx-auto mt-4 md-4">
        <form [formGroup]="searchForm">
            <div class="row">
                <div class="col-3 marginFieldNew borderRadius12">
                    <p class="formControlLabel f600 textBlack mb-0">Date</p>
                    <p-calendar [yearNavigator]="true" [showButtonBar]="true" #myStartCalendar [monthNavigator]="true"
                        yearRange="2000:2099" (onSelect)="filter('date')" dateFormat="dd/mm/yy"
                        [hideOnDateTimeSelect]="true" formControlName="fullDate" placeholder="Choose Date"
                        selectionMode="range" [readonlyInput]="true" inputId="range" />
                </div>
                <div class="col-3 marginFieldNew borderRadius12">
                    <p class="formControlLabel f600 textBlack mb-0 required">Customer</p>
                    <p-multiSelect [showClear]="true"  [filter]="true" placeholder="Select" [options]="customerList" formControlName="partnerId" appendTo="body" [style]="{'width': '100%'}" [disabled]="true"
                        [panelStyle]="{'width':'100%'}" />
                            <mat-error *ngIf="errorHandling('partnerId')" class="text-danger"><small>{{
                                        getErrorMessage()}}</small></mat-error>
                </div>
                
                <div class="col-3 marginFieldNew borderRadius12">
                    <p class="formControlLabel f600 textBlack mb-0">MAWB</p>
                    <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="mawbList"
                        formControlName="partnerMasterAirwayBill" appendTo="body" [style]="{'width': '100%'}"
                        [panelStyle]="{'width':'100%'}" />
                </div>
            </div>
        </form>
        <div class="d-flex-row">
           
            <div class="tableProperties">
                <p-table #costSheetTag [columns]="cols" [value]="costSheetTable" class="custom-table" [scrollable]="true"
                    selectionMode="multiple" [(selection)]="selectedCostSheet"  scrollHeight="calc(100vh - 22.8rem)" [paginator]="true" [rows]="100"
                    [showCurrentPageReport]="true" sortField="createdOn" [sortOrder]="-1" [tableStyle]="{'width': '240rem'}"
                    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" styleClass="p-datatable-sm">
                    <ng-template pTemplate="header" let-columns>
                        <tr>
                            <th style="width: 5rem;">
                                <p-tableHeaderCheckbox class="pl-3" ></p-tableHeaderCheckbox>
                            </th>
                            <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                                {{ col.header }} <p-sortIcon [field]="col.field" />
                            </th>
                         </tr>
                        <tr>
                            <th style="width: 5rem;">
                                <p-tableHeaderCheckbox class="pl-3" [disabled]="true"></p-tableHeaderCheckbox>
                            </th>
                            <th *ngFor="let col of columns">
                                <input  pInputText appTrim  type="text"
                                    (input)="costSheetTag.filter($any($event.target)?.value, col.field, 'contains')"
                                    [value]="$any(costSheetTag.filters[col.field])?.value" placeholder="Search"
                                    class="p-column-filter">
                            </th>
                           </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-rowData let-columns="columns">
                        <tr>
                            <td style="width: 5rem; justify-content: center;">
                                <p-tableCheckbox class="pl-3" [value]="rowData" />
                            </td>
                            <td *ngFor="let col of columns" [style]="col.style">
                                <ng-container *ngIf="col.format !== 'Input'; else dateTemplate">
                                    {{ rowData[col.field] }}
                                </ng-container>
                                <ng-template #dateTemplate>
                                    <ng-container *ngIf="col.format == 'Input'">
                                        {{ rowData[col.field] != null ? rowData[col.field].toFixed(3) : ''}}                                    
                                    </ng-container>
                                </ng-template>
                            </td>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="footer" let-columns>
                        <tr>
                            <td></td>
                          <ng-container *ngFor="let col of columns">
                              <td *ngIf="col.showFooter">{{ calculateFooterTotal(col.field) }}</td>
                              <td  *ngIf="!col.showFooter"></td>
                          </ng-container>
                        </tr>
                      </ng-template>

                    <ng-template pTemplate="emptymessage">
                        <tr>
                            <td [attr.colspan]="4">
                                <p class="my-2 w-100 pl-3">No records found</p>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </div>
</div>
