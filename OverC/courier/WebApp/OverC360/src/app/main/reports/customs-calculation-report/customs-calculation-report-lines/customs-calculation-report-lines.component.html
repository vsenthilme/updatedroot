<div class="componentBody">
    <div class="d-flex justify-content-between align-items-center">
        <p class="componentHeader f600 mb-0">{{pageFlow}}</p>
        <div class="d-flex justify-content-between align-items-center">
            <img type="button" (click)="downloadExcel()" src="./assets/common/download.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
           
        </div>
    </div>

    <div class="mx-auto mt-4">
        <form [formGroup]="form">
            <div class="d-flex-row">
                <div class="row scrollNew">
                    <div class="col-3 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Language</p>
                        <p-dropdown [showClear]="true"  [options]="languageIdList" formControlName="languageId" appendTo="body"
                            [style]="{'width': '100%'}" [disabled]="true" [panelStyle]="{'width':'100%'}" >
                            <ng-template pTemplate="filter"><input type="text"  pInputText appTrim  appTrim
                                placeholder="Search" /></ng-template></p-dropdown>
                        <mat-error *ngIf="errorHandling('languageId')"
                            class="text-danger"><small>{{getErrorMessage()}}</small></mat-error>
                    </div>
                    <div class="col-3 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Company</p>
                        <p-dropdown [showClear]="true"  [options]="companyIdList" formControlName="companyId" appendTo="body"
                            [style]="{'width': '100%'}" [disabled]="true" [panelStyle]="{'width':'100%'}" >
                            <ng-template pTemplate="filter"><input type="text"  pInputText appTrim  appTrim
                                placeholder="Search" /></ng-template></p-dropdown>
                        <mat-error *ngIf="errorHandling('companyId')"
                            class="text-danger"><small>{{getErrorMessage()}}</small></mat-error>
                    </div>
                    <div class="col-3 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Partner MAWB</p>
                        <input maxlength="50"  pInputText appTrim  formControlName="partnerMasterAirwayBill" class="w-100"
                             pInputText appTrim  placeholder="Enter" />
                    </div>
                    <!-- <div class="col-3 marginFieldNew borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Status</p>
                        <input maxlength="50"  pInputText appTrim  pKeyFilter="alphanum" formControlName="statusText"
                        class="w-100"  pInputText appTrim  placeholder="Enter" />
                    </div> -->
                </div>
                <!-- <div class="d-flex justify-content-end mb-3">
                    <button (click)="add()" type="button" class="btn ml-2 addNewbuttom bgBlack text-white"><i
                            class="bi bi-plus-square pr-2"></i>Add Values</button>
                </div> -->
                <div class="tableProperties">
                    <p-table #customsCalTag [columns]="cols" [value]="customsCalculationArray" class="custom-table" [scrollable]="true"
                        selectionMode="multiple" sortField="createdOn" [sortOrder]="-1" [(selection)]="selectedConsole"
                        scrollHeight="calc(100vh - 23rem)" sortField="createdOn" [sortOrder]="-1" [paginator]="true"
                        [rows]="100" [showCurrentPageReport]="true"
                        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
                        [tableStyle]="tableStyle" styleClass="p-datatable-sm">
                        <ng-template pTemplate="header" let-columns>
                            <tr>
                                <th style="width: 5rem;" pFrozenColumn>
                                    <p-tableHeaderCheckbox class="pl-3"></p-tableHeaderCheckbox>
                                </th>
                                <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                                    {{ col.header }} <p-sortIcon [field]="col.field" />
                                </th>
                               
                            </tr>
                            <tr>
                                <th style="width: 5rem;" pFrozenColumn>
                                    <p-tableHeaderCheckbox [disabled]="true" class="pl-3"></p-tableHeaderCheckbox>
                                </th>
                                <th *ngFor="let col of columns">
                                    <input  pInputText appTrim  type="text"
                                        (input)="customsCalTag.filter($any($event.target)?.value, col.field, 'contains')"
                                        [value]="$any(customsCalTag.filters[col.field])?.value" placeholder="Search"
                                        class="p-column-filter">
                                </th>
                              
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-rowData let-columns="columns" let-expanded="expanded">
                            <tr [class.selectedRow]="selectedConsole[0] === rowData">
                                <td style="width: 5rem;" pFrozenColumn>
                                    <p-tableCheckbox class="pl-3" [value]="rowData" />
                                </td>
                                <td *ngFor="let col of columns">
                                    <ng-container *ngIf="col.format !== 'date'; else dateTemplate">
                                        {{ rowData[col.field] }}
                                    </ng-container>
                                    <ng-template #dateTemplate>
                                        {{ rowData.createdOn | date: 'dd-MM-yyyy HH:mm' }}
                                    </ng-template>
                                </td>
                             
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="footer" let-columns>
                            <tr>
                                <td></td>
                                <ng-container *ngFor="let col of columns">
                                    <ng-container *ngIf="col.showFooter">
                                        <td>
                                            {{ calculateFooterTotal(col.field) != 0 ? calculateFooterTotal(col.field) : ''
                                            }}
                                        </td>
                                    </ng-container>
                                    <ng-container *ngIf="!col.showFooter">
                                        <td></td>
                                    </ng-container>
                                </ng-container>
                                <td></td>
                            </tr>
                        </ng-template>
                        <ng-template pTemplate="emptymessage">
                            <tr>
                                <td [attr.colspan]="4">
                                    <p class="my-2 w-100 pl-3">No records found</p>
                                </td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
            <div class="d-flex mt-1 justify-content-end" style="position: absolute; right: 50%; bottom: 7%;">
                <button class="buttom1 textBlack mx-1" (click)="back()">Cancel</button>
                <!-- <button class="buttom1 bgBlack text-white mx-1" (click)="saveCCR()">CCR</button> -->
            </div>
        </form>
    </div>
</div>
