<div class="componentBody">
    <div class="d-flex justify-content-between align-items-center">
        <p class="componentHeader f600 mb-0">Consignment </p>
        <div class="d-flex justify-content-between align-items-center">
            <input type="file" #fileInput style="display:none" (change)="onFileSelected($event)" />
            <img type="button" (click)="openCrud('Edit')" src="./assets/common/edit.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button" (click)="downloadExcel()" src="./assets/common/download.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button" (click)="deleteDialog()" src="./assets/common/deletetool.png" alt="" srcset=""
                style="margin: 0 17px; height: 1.5rem;">
            <img type="button" (click)="op.toggle($event)" src="./assets/common/settings.png" alt="" srcset=""
                style="margin-left: 19px; margin-right: 28px; height: 1.5rem;">
            <p-overlayPanel [style]="{ width: '180' }" #op>
                <div class="d-flex flex-column">
                    <button style="width: 8rem;" mat-menu-item class="w-100" (click)="op.hide(); fileInput.click()"><img
                            src="./assets/common/upload.png" style="padding-right: 10px;width: 2rem;"
                            srcset="">Upload</button>
                    <button style="width: 8rem;" mat-menu-item class="w-100" (click)="op.hide(); updateBulk()"><img
                            src="./assets/common/upload.png" style="padding-right: 10px;width: 2rem;" srcset="">Bulk
                        Update</button>
                    <button style="width: 8rem;" mat-menu-item class="w-100" (click)="generateLabel()"><img
                            src="./assets/common/document.png" style="padding-right: 10px;width: 2rem;"
                            srcset="">Label</button>
                    <button style="width: 8rem;" mat-menu-item class="w-100" (click)="generateInvoice()"><img
                            src="./assets/common2x/invoice.png" style="padding-right: 10px;width: 2rem;"
                            srcset="">Invoice</button>
                </div>
            </p-overlayPanel>
            <button (click)="downloadTemplate()" type="button" class="btn ml-2 addNewbuttom bgBlack text-white"><i
                    class="bi bi-plus-square pr-2"></i> Add New</button>
        </div>
    </div>

    <div class="d-flex justify-content-start align-items-center"
        style="margin-bottom: 1.1rem !important;margin-top: 0.8rem;">
        <p-iconField iconPosition="right" class="mr-2">
            <p-inputIcon type="button" (click)="consignment.toggle($event)" styleClass="pi pi-filter" />
            <input type="text" id="toolInput1"  pInputText appTrim  placeholder="Advance filter"
                (input)="consignmentTag.filterGlobal($any($event.target).value, 'contains')" />
        </p-iconField>

        <p-overlayPanel [dismissable]="false" appendTo="body" [style]="{ width: '80vw'}"
            [styleClass]="'custom-overlay-panel'" #consignment>
            <form [formGroup]="searchform" style="padding: 2rem;">
                <div class="row">
                    <div class="col-3 mb-3 borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">MAWB</p>
                        <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="masterAirwayBillDropdown"
                            formControlName="masterAirwayBill" appendTo="body" [style]="{'width': '100%'}"
                            [panelStyle]="{'width':'100%'}" />
                    </div>
                    <div class="col-3 mb-3 borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">HAWB</p>
                        <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="houseAirwayBillDropdown"
                            formControlName="houseAirwayBill" appendTo="body" [style]="{'width': '100%'}"
                            [panelStyle]="{'width':'100%'}" />
                    </div>
                    <div class="col-3 mb-3 borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Partner</p>
                        <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="partnerDropdown"
                            formControlName="partnerId" appendTo="body" [style]="{'width': '100%'}"
                            [panelStyle]="{'width':'100%'}" />
                    </div>
                    <div class="col-3 mb-3 borderRadius12">
                        <p class="formControlLabel f600 textBlack mb-0">Status</p>
                        <p-multiSelect [showClear]="true" placeholder="Select" filter="true" [options]="statusDropdown"
                            formControlName="statusId" appendTo="body" [style]="{'width': '100%'}"
                            [panelStyle]="{'width':'100%'}" />
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <div>
                        <img type="button" (click)="reset()" src="./assets/common/reset.png" alt="" srcset="">
                    </div>
                    <div>
                        <button class="buttom1 textBlack mx-1" (click)="closeOverLay()">Cancel</button>
                        <button class="buttom1 bgBlack text-white mx-1" (click)="search()">Apply</button>
                    </div>
                </div>
            </form>
        </p-overlayPanel>

        <p-chips (onRemove)="chipClear($event)" [(ngModel)]="fieldsWithValue" class="inputborderLess" />
    </div>

    <div class="tableProperties">
        <p-table #consignmentTag [columns]="cols" [value]="consignmentTable" class="custom-table" [scrollable]="true"
            selectionMode="multiple" [(selection)]="selectedConsignment" scrollHeight="calc(100vh - 20.8rem)"
            [paginator]="true" [rows]="100" [showCurrentPageReport]="true" sortField="consignmentId" [sortOrder]="-1"
            [tableStyle]="{'width': '130rem'}"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" styleClass="p-datatable-sm">
            <ng-template pTemplate="header" let-columns>
                <tr>
                    <th style="width: 5rem;" pFrozenColumn>
                        <p-tableHeaderCheckbox class="pl-3"></p-tableHeaderCheckbox>
                    </th>
                    <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                        {{ col.header }} <p-sortIcon [field]="col.field" />
                    </th>
                    <th style="width: 5rem;" pFrozenColumn alignFrozen="right">
                        Actions
                    </th>
                </tr>
                <tr>
                    <th style="width: 5rem;" pFrozenColumn>
                        <p-tableHeaderCheckbox [disabled]="true" class="pl-3"></p-tableHeaderCheckbox>
                    </th>
                    <th *ngFor="let col of columns">
                        <input  pInputText appTrim  type="text"
                            (input)="consignmentTag.filter($any($event.target)?.value, col.field, 'contains')"
                            [value]="$any(consignmentTag.filters[col.field])?.value" placeholder="Search"
                            class="p-column-filter">
                    </th>
                    <th style="width: 5rem;" pFrozenColumn alignFrozen="right">
                    </th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-rowData let-columns="columns">
                <tr [ngClass]="{'selectedRow': isSelected(rowData)}">
                    <td style="width: 5rem; justify-content: center;" pFrozenColumn>
                        <p-tableCheckbox class="pl-3" [value]="rowData" />
                    </td>
                    <td *ngFor="let col of columns" [style]="col.style">
                        <ng-container *ngIf="col.format !== 'date' && col.format !== 'hyperLink'; else dateTemplate">
                            {{ rowData[col.field] }}
                        </ng-container>
                        <ng-template #dateTemplate>
                            <span *ngIf="col.format == 'hyperLink'" (click)="openCrud('Edit', rowData)"
                                style="cursor:pointer" class="textOrange font-weight-bold hvr-underline-from-center">{{
                                rowData[col.field] }}</span>
                            <span *ngIf="col.format == 'date'">{{ rowData[col.field] | date: 'dd-MM-yyyy HH:mm'}}</span>
                        </ng-template>
                    </td>

                    <td style="width: 5rem; justify-content: center;" pFrozenColumn alignFrozen="right">
                        <img type="button" (click)="label.toggle($event)" src="./assets/common/actions.png" alt=""
                            srcset="" style="height: 1.4rem;">

                        <p-overlayPanel [style]="{ width: '180' }" #label>
                            <div class="d-flex flex-column">
                                <button style="width: 8rem;" mat-menu-item class="w-100"
                                    (click)="label.hide(); downloadLabel(rowData, 'download')"><img
                                        src="./assets/common/download.png" style="padding-right: 10px;width: 2rem;"
                                        srcset="">Download</button>
                                <button style="width: 8rem;" mat-menu-item class="w-100"
                                    (click)="label.hide(); downloadLabel(rowData, 'print')"><img
                                        src="./assets/common/print.png" style="padding-right: 10px;width: 2rem;"
                                        srcset="">Print</button>
                                <button style="width: 8rem;" mat-menu-item class="w-100" [disabled]="rowData.incoTerms != 'DDU' && rowData.hawbTypeId != 7"
                                    (click)="label.hide(); downloadInvoice(rowData, 'download')"><img
                                        src="./assets/common/document.png" style="padding-right: 10px;width: 2rem;"
                                        srcset="">Invoice</button>
                            </div>
                        </p-overlayPanel>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td [attr.colspan]="4">
                        <p class="my-2 w-100 pl-3">No records found</p>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
