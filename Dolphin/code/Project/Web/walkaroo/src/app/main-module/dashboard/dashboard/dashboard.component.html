<!-- *ngIf="!this.prod"-->

<div class="row bg-white margint-2 px-0 mx-0" style="height: calc(100vh - 8rem);">
  <!-- <div class="col-5 offset-2 mx-1 my-2"> -->
  <div class="col-6 my-auto">
    <app-putaway-productivity></app-putaway-productivity>
  </div>
  <div class="col-6 my-auto">
    <app-new-chart></app-new-chart>
  </div>
</div>

<mat-tab-group animationDuration="0ms" class="mt-1 d-none">

  <mat-tab label="Bin Status ">
    <ng-template mat-tab-label>
      <ul class="nav nav-tabs mt-1">
        <li class="nav-item">
          <p class="nav-link whs-text-grey pl-2 py-1 pl-1 row mx-0" href="">
            <img src="./assets/img/icons/shield.png" class="header_icon" alt="" srcset="">Warehouse Monitor
          </p>
        </li>
      </ul>
    </ng-template>
    <div class="text-center">
      <app-warehouse-layout></app-warehouse-layout>
    </div>
  </mat-tab>

  <mat-tab label="Operations 1">
    <ng-template mat-tab-label>
      <ul class="nav nav-tabs mt-1">
        <li class="nav-item">
          <p class="nav-link navpadding bg-white whs-text-grey pl-2 py-1 pl-1 row mx-0" href="">
            <img src="./assets/img/icons/shield.png" class="header_icon" alt="" srcset="">Operations 1
          </p>
        </li>
      </ul>
    </ng-template>
    <div class="row  margint-2 px-0 mx-0 ">
      <div class="col-10 mx-1">
        <app-putaway-productivity></app-putaway-productivity>
      </div>
      <div class="col-10 mx-1">
        <app-stack-chart></app-stack-chart>
      </div>
    </div>
  </mat-tab>



</mat-tab-group>
