<form [formGroup]="form" (ngSubmit)="submit()">
    <div class="card bg-white " style="overflow-x: hidden;">
      <div mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
        class="d-flex justify-content-between align-items-center whs-bg-grey text-white p-2">
        <h6 class="my-auto">Charges - New </h6>
        <mat-icon class="text-white" mat-dialog-close>close</mat-icon>
      </div>
      <div class="mt-2 px-4">
        <div class="row  p-1">
  
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 required">Module</p>
              <p-dropdown placeholder="Select" class="w-100" [filter]="true" [options]="moduleList"  #moduleId 
              (onChange)="onpartnertytpeChange(moduleId.value)" 
                formControlName="moduleId"
                [style]="{'width': '100%', 'margin-top': '0.3rem', 'margin-bottom': '0.3rem'}"
                [panelStyle]="{'width':'20%'}" appendTo="body"> </p-dropdown>
            </div>
          </div>
  
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black required">Service Type</p>
              <p-dropdown placeholder="Select" class="w-100" [filter]="true" [options]="serviceTypeList"  #serviceTypeId
              (onChange)="onservetypeChange(serviceTypeId.value)" 
                formControlName="serviceTypeId"
                [style]="{'width': '100%', 'margin-top': '0.3rem', 'margin-bottom': '0.3rem'}"
                [panelStyle]="{'width':'20%'}" appendTo="body"> </p-dropdown>
            </div>
          </div>
  
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black required">ID</p>
              <mat-form-field class="mb-0 w-100 " appearance="outline">
                <input matInput formControlName="chargeRangeId">
              </mat-form-field>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">From</p>
              <mat-form-field class="mb-0 w-100 " appearance="outline">
                <input matInput formControlName="chargeRangeFrom">
              </mat-form-field>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">To</p>
              <mat-form-field class="mb-0 w-100 " appearance="outline">
                <input matInput formControlName="chargeRangeTo">
              </mat-form-field>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">Unit</p>
              <p-dropdown placeholder="Select" class="w-100" [filter]="true" [options]="uomList"  
                formControlName="chargeUnit"
                [style]="{'width': '100%', 'margin-top': '0.3rem', 'margin-bottom': '0.3rem'}"
                [panelStyle]="{'width':'20%'}" appendTo="body"> </p-dropdown>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">Minimum Monthly Cost</p>
              <mat-form-field class="mb-0 w-100 " appearance="outline">
                <input matInput formControlName="minMonthlyPrice">
              </mat-form-field>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">Rate Per Unit</p>
              <mat-form-field class="mb-0 w-100 " appearance="outline">
                <input matInput formControlName="pricePerChargeUnit">
              </mat-form-field>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">Rate Unit</p>
              <p-dropdown placeholder="Select" class="w-100" [filter]="true" [options]="currencyList" #chargeUnit
                formControlName="priceUnit"  (onChange)="currencychange(chargeUnit.value)" 
                [style]="{'width': '100%', 'margin-top': '0.3rem', 'margin-bottom': '0.3rem'}"
                [panelStyle]="{'width':'20%'}" appendTo="body"> </p-dropdown>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">Validity From</p>
              <mat-form-field class="form-group input_field2 mb-0 w-100" appearance="outline">
                <input matInput [matDatepicker]="picker" placeholder="Start date" formControlName="fromPeriod">
                <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
              </mat-form-field>
            </div>
          </div>
          <div class="col-lg-6 col-md-6 mt-1">
            <div class="d-flex flex-column">
              <p class="mb-0 py-0 text-black ">Validity To</p>
              <mat-form-field class="form-group input_field2 mb-0 w-100" appearance="outline">
                <input matInput [matDatepicker]="picker2" placeholder="Start date" formControlName="toPeriod">
                <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
                <mat-datepicker #picker2></mat-datepicker>
              </mat-form-field>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-center align-items-center py-2">
        <button mat-raised-button color="warn" mat-dialog-close class="mx-2"> <i
            class="bi bi-x me-1 font-size-1_5rem"></i>Cancel</button>
        <button mat-raised-button class="mx-2 bg-darkblue px-4 text-white"> <i
            class="bi bi-check2 mr-1 font-size-1_5rem"></i>
          Save</button>
      </div>
  
  
    </div>
  </form>
