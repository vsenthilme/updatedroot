<div class="row mx-1 pl-2">
  <div class="col-12">
    <!--inner header-->

    <div class="row  text-secondary pr-0 mt-1">
      <div class="col bg-white d-flex align-items-center mt-1 px-1 py-1 pathname">


        <nav aria-label="breadcrumb" class="d-flex align-items-center">
          <ol class="breadcrumb mb-0 bg-white">
            <!-- <li class="breadcrumb-item whs-fontsize-1-2rem  my-auto"><a routerLink="/main/dashboard/landingPage">Home</a></li> -->
            <li class="breadcrumb-item whs-fontsize-1-2rem  my-auto"><a routerLink="/main/dashboard/landingPage">Home</a></li>
            <li class="breadcrumb-item" class=" whs-fontsize-1-2rem  my-auto">Outbound</li>
            <li class="breadcrumb-item" class=" whs-fontsize-1-2rem  my-auto">Preoutbound</li>

          </ol>
        </nav>


        <div class="d-flex ml-auto my-auto">
          <div [hidden]="isShowDiv"> <input matInput
              (input)="preoutboundMainTag.filterGlobal($any($event.target).value, 'contains')"
              class="form-control filter_button mt-2 mt-2 mx-2 border-bottom" placeholder="Search" style="width:90%">
          </div>
          <div [ngClass]="showFloatingButtons == true ? 'floating-pane-active' : 'floating-pane-deactive'"
            class="button-row d-flex align-items-center">
            <!--
                          <button mat-mini-fab *ngIf="showFloatingButtons == true" class="floating-buttons  d-flex align-items-center justify-content-center bg-pink text-white mx-2"
                          matTooltip="Add">
                          <mat-icon class="action-icon d-flex align-items-center justify-content-center">add_circle_outline</mat-icon>
                        </button>
                        -->
            <button mat-mini-fab *ngIf="showFloatingButtons == true"
              class=" floating-buttons  d-flex align-items-center justify-content-center text-white   yellowaction"
              matTooltip="Display" (click)="openDialog('Display')" [disabled]="!RA.view">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">search</mat-icon>
            </button>
            <button mat-mini-fab *ngIf="showFloatingButtons == true"
              class="floating-buttons  d-flex align-items-center justify-content-center text-white  blueaction "
              matTooltip="Edit" [disabled]="!RA.createUpdate">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">edit</mat-icon>
            </button>
            <button mat-mini-fab *ngIf="showFloatingButtons == true"
              class=" floating-buttons  d-flex align-items-center justify-content-center redaction text-white  align-middle"
              matTooltip="Delete" [disabled]="!RA.delete">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">delete</mat-icon>
            </button>
            <!-- 
                          <button  mat-mini-fab *ngIf="showFloatingButtons == true"
                        class="floating-buttons  d-flex align-items-center justify-content-center text-white  bg-success  " matTooltip="Info">
                        <mat-icon class="action-icon d-flex align-items-center justify-content-center">info_outline</mat-icon>
                      </button>
                        -->
            <button mat-mini-fab *ngIf="showFloatingButtons == true"
              class="floating-buttons  d-flex align-items-center justify-content-center text-white  darkblueaction "
              matTooltip="Download" (click)="downloadexcel()">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center">download</mat-icon>
            </button>


            <button mat-mini-fab (click)="toggleFloat()" class="mx-2 text-white action-button"
              [ngClass]="{'bg-orange' : toggle, 'purple': !toggle}">
              <mat-icon>{{icon}}</mat-icon>Options
            </button>
            <button mat-mini-fab [matMenuTriggerFor]="templateChoose"
              class=" floating-buttons1  d-flex align-items-center justify-content-center darkaction text-white mx-2 mr-3 align-middle"
              matTooltip="New">
              <!--(click)="preOutboundUpload()"-->
              <mat-icon class="action-icon d-flex align-items-center justify-content-center my-auto">add</mat-icon>
            </button>
            <button mat-mini-fab
              class=" floating-buttons1  d-flex align-items-center justify-content-center greyaction text-white mx-2 mr-3 align-middle"
              matTooltip="Save">
              <mat-icon class="action-icon d-flex align-items-center justify-content-center my-auto">save</mat-icon>
            </button>
            <button mat-mini-fab class="text-white mx-2 action-button  bg-red" type="button" (click)="drawer.toggle()"
              mat-button>
              <mat-icon class="">tune</mat-icon> Filter
            </button>
          </div>

        </div>
      </div>
    </div>
    <!--main-section-tabbar
        <app-main-section-tabbar>
        </app-main-section-tabbar>  -->
  </div>
  <!--main section-->
  <div class="pr-1 mt-2 mx-0 w-100">
    <app-order-tab></app-order-tab>
  </div>

  <mat-drawer-container class="example-container  w-100 animate__animated animate__fadeInRight animate__faster">
    <mat-drawer #drawer class="example-sidenav " mode="over" position="end">
      <div class="card-header whs-bg-grey text-white d-flex justify-content-between align-items-center">
        <h6 class="my-auto mb-0">Search Parameter</h6>
        <mat-icon type="button" (click)="drawer.toggle()">close</mat-icon>
      </div>
      <form [formGroup]="searhform">
        <div class="row searchscroll mt-1 mr-1 p-2 pl-3">
          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Preoutbound No</label>
              <!-- <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings" [data]="preOutboundNoList"
                [(ngModel)]="preOutboundNoselected" [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown> -->
              <!-- <angular2-multiselect [data]="preOutboundNoList" [(ngModel)]="preOutboundNoselected"
                [settings]="dropdownSettings" (onSelect)="onItemSelect($event)" (onDeSelect)="OnItemDeSelect($event)"
                (onSelectAll)="onSelectAll($event)" (onDeSelectAll)="onDeSelectAll($event)"
                formControlName="preOutboundNo"></angular2-multiselect> -->
              <p-multiSelect placeholder="Select" class="w-100" [options]="preOutboundNoList"
                formControlName="preOutboundNo" [style]="{'width': '100%'}" [panelStyle]="{'width':'20%'}">
              </p-multiSelect>
            </div>
          </div>
          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Store Code</label>
              <!-- <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings" [data]="partnerCodeList"
                [(ngModel)]="partnerCodeListselected" [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown> -->
              <!-- <angular2-multiselect [data]="partnerCodeList" [(ngModel)]="partnerCodeListselected"
                [settings]="dropdownSettings" (onSelect)="onItemSelect($event)" (onDeSelect)="OnItemDeSelect($event)"
                (onSelectAll)="onSelectAll($event)" (onDeSelectAll)="onDeSelectAll($event)"
                formControlName="partnerCode"></angular2-multiselect> -->
              <p-multiSelect placeholder="Select" class="w-100" [options]="partnerCodeList"
                formControlName="partnerCode" [style]="{'width': '100%'}" [panelStyle]="{'width':'20%'}">
              </p-multiSelect>
            </div>
          </div>
          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Order Type</label>
              <!-- <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings" [data]="outboundOrderTypeIdList"
                [(ngModel)]="outboundOrderTypeIdListselected" [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown> -->
              <!-- <angular2-multiselect [data]="outboundOrderTypeIdList" [(ngModel)]="outboundOrderTypeIdListselected"
                [settings]="dropdownSettings" (onSelect)="onItemSelect($event)" (onDeSelect)="OnItemDeSelect($event)"
                (onSelectAll)="onSelectAll($event)" (onDeSelectAll)="onDeSelectAll($event)"
                formControlName="outboundOrderTypeId"></angular2-multiselect> -->
              <p-multiSelect placeholder="Select" class="w-100" [options]="outboundOrderTypeIdList"
                formControlName="outboundOrderTypeId" [style]="{'width': '100%'}" [panelStyle]="{'width':'20%'}">
              </p-multiSelect>
            </div>
          </div>
          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">Status</label>
              <!-- <ng-multiselect-dropdown [placeholder]="'Select'" [settings]="dropdownSettings" [data]="statusIdList"
                [(ngModel)]="statusIdListselected" [ngModelOptions]="{standalone: true}">
              </ng-multiselect-dropdown> -->
              <!-- <angular2-multiselect [data]="statusIdList" [(ngModel)]="statusIdListselected"
                [settings]="dropdownSettings" (onSelect)="onItemSelect($event)" (onDeSelect)="OnItemDeSelect($event)"
                (onSelectAll)="onSelectAll($event)" (onDeSelectAll)="onDeSelectAll($event)" formControlName="statusId">
              </angular2-multiselect> -->
              <p-multiSelect placeholder="Select" class="w-100" [options]="statusIdList" formControlName="statusId"
                [style]="{'width': '100%'}" [panelStyle]="{'width':'20%'}"> </p-multiSelect>
            </div>
          </div>

          <div class="col-12 my-1">
            <div class="form-group mb-0">
              <label for="inputEmail4" class="mb-0">SO Type</label>
              <!-- <mat-form-field class="mb-0 w-100 " appearance="outline">
                <mat-select class="mb-0" placeholder="Select"  formControlName="soType">
                  <mat-option value="S">S</mat-option>
                  <mat-option value="N">N</mat-option>
                </mat-select>
              </mat-form-field> -->
              <p-multiSelect placeholder="Select" class="w-100" [options]="soTypeList1" formControlName="soType"
                [style]="{'width': '100%'}" [panelStyle]="{'width':'20%'}"> </p-multiSelect>
            </div>
          </div>

          <div class="col-12 my-1">
            <p class="mb-0 py-0">Required Date</p>
            <mat-form-field class="form-group input_field mb-0 w-100" appearance="outline">
              <mat-date-range-input [rangePicker]="picker1">
                <input matStartDate placeholder="Start date" formControlName="startRequiredDeliveryDate">
                <input matEndDate placeholder="End date" formControlName="endRequiredDeliveryDate">
              </mat-date-range-input>
              <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
              <mat-date-range-picker #picker1></mat-date-range-picker>
            </mat-form-field>

          </div>

          <div class="col-12 my-1">
            <p class="mb-0 py-0">Ordered Date</p>
            <mat-form-field class="form-group input_field mb-0 w-100" appearance="outline">
              <mat-date-range-input [rangePicker]="picker2">
                <input matStartDate placeholder="Start date" formControlName="startOrderDate">
                <input matEndDate placeholder="End date" formControlName="endOrderDate">
              </mat-date-range-input>
              <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
              <mat-date-range-picker #picker2></mat-date-range-picker>
            </mat-form-field>

          </div>
        </div>
      </form>
      <div class="d-flex justify-content-center align-items-center py-2">
        <button mat-raised-button color="warn" class="text-white mx-1 px-4" (click)="reload();">
          <mat-icon class="">restart_alt</mat-icon> Reset
        </button>
        <button mat-raised-button class="bg-darkblue text-white mx-1" (click)="search(); drawer.toggle();">
          <mat-icon class="">done</mat-icon> Search
        </button>
      </div>
    </mat-drawer>
    <div class="example-sidenav-content">
      <!-- <div class="row "style="padding-right: 15px !important;"> -->
      <div class="row ">
        <p-table #preoutboundMainTag [columns]="cols" [value]="preoutboundMain"
          styleClass="p-datatable-gridlines p-datatable-sm" [scrollable]="true" selectionMode="single" selectionMode="single"
          scrollHeight="calc(100vh - 15.2rem)" [paginator]="true" [rows]="100" [showCurrentPageReport]="true"
          currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [resizableColumns]="true"
          style="width: 100%;margin-left: 10px;background-color:white">
          <ng-template pTemplate="header" let-columns>
            <tr>
              <th style="max-width: 3.5rem;">
                <p-tableHeaderCheckbox class="pl-3" [disabled]="true"></p-tableHeaderCheckbox>
              </th>
              <th *ngFor="let col of columns">
                {{ col.header }}
              </th>
            </tr>
            <tr>
              <th style="max-width: 3.5rem;">
                  <p-tableHeaderCheckbox class="pl-3"
                      [disabled]="true"></p-tableHeaderCheckbox>
              </th>
              <th *ngFor="let col of columns">
                  <input pInputText type="text"
                      (input)="preoutboundMainTag.filter($any($event.target)?.value, col.field, 'contains')"
                      [value]="$any(preoutboundMainTag.filters[col.field])?.value"
                      placeholder="Search" class=" w-100 p-column-filter">
              </th>
          </tr>
          </ng-template>
          <ng-template pTemplate="body" let-rowData let-columns="columns">
            <tr>
              <td style="max-width: 3.5rem;">
                <p-checkbox (onChange)="onChange()" [(ngModel)]="selectedpreoutboundManin" class="pl-3"
                  [value]="rowData"></p-checkbox>
              </td>
              <td *ngFor="let col of columns">
                <ng-container *ngIf="col.format == 'value'; else otherTemplate">
                  {{ rowData[col.field] }}
                </ng-container>
                <ng-template #otherTemplate>
                  <span *ngIf="rowData[col.field] == 'refDocNumber'"
                    style="text-decoration-line: underline;cursor:pointer" class="text-primary"
                    (click)="openDialog('Display',rowData)">{{rowData[col.field]}}</span>
                  <span *ngIf="rowData[col.format] == 'details'"
                    (click)="openDialogView(rowData)"><mat-icon>code</mat-icon></span>
                </ng-template>
              </td>
            </tr>
          </ng-template>
        </p-table>

      </div>

    </div>
  </mat-drawer-container>
  <input type="file" #fileInput style="display:none" (change)="onFileSelected($event)" />
  <mat-menu #templateChoose="matMenu" >
    <button mat-menu-item [matMenuTriggerFor]="createManual">Create</button>
    <button mat-menu-item [matMenuTriggerFor]="uploadTemplate">Upload</button>
    <button mat-menu-item [matMenuTriggerFor]="downloadTemplate">Download</button>
  </mat-menu>

  <mat-menu #createManual="matMenu" >
    <button mat-menu-item routerLink="/main/outbound/salesinvoice">Sales Order</button>
    <button mat-menu-item routerLink="/main/outbound/preboutboundUpload">Warehouse To Store</button>
    <button mat-menu-item routerLink="/main/outbound/interwarehouse">Warehouse To Warehouse</button>
    <button mat-menu-item routerLink="/main/outbound/purchasereturn">Purchase Return</button>
  </mat-menu>

  <mat-menu #uploadTemplate="matMenu" >
    <button mat-menu-item (click)="setContextAndClick('salesOrder')">Sales Order</button>
    <button mat-menu-item (click)="setContextAndClick('so')">Warehouse To Store</button>
    <button mat-menu-item (click)="setContextAndClick('so')">Warehouse To Warehouse</button>
    <button mat-menu-item (click)="setContextAndClick('so')">Purchase Return</button>
  </mat-menu>

  <mat-menu #downloadTemplate="matMenu" >
    <button mat-menu-item routerLink="/main/outbound/salesinvoice">Sales Order</button>
    <button mat-menu-item routerLink="/main/outbound/preboutboundUpload">Warehouse To Store</button>
    <button mat-menu-item routerLink="/main/outbound/interwarehouse">Warehouse To Warehouse</button>
    <button mat-menu-item routerLink="/main/outbound/purchasereturn">Purchase Return</button>
  </mat-menu>
</div>
