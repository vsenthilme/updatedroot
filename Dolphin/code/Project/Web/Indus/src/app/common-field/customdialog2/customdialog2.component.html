<form [formGroup]="form">
  <div class="card bg-white " style="overflow-x: hidden;">
    <div mat-dialog-title cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle
      class="d-flex justify-content-between align-items-center whs-bg-grey text-white p-2">
      <h6 class="my-auto">{{data.title}} </h6>
      <mat-icon class="text-white" (click)="cancel()">close</mat-icon>
    </div>
    <mat-accordion>

      <div class="mt-2" *ngIf="data.title == 'Remarks'  && data.title !='Quality Details'">
        <div class="row  p-2 mx-0">
          <div class="col-12 mt-2 mr-1">
            <p class="mb-0 py-0 text-black">{{data.body}}</p>
            <mat-form-field class="form-group input_field mb-0" appearance="outline">
              <textarea matInput rows="6" formControlName="remarks"></textarea>
            </mat-form-field>
          </div>
        </div>
      </div>
      <div class="mt-2" *ngIf="data.title =='Assign Invoice' || 'Enter Number' && data.title != 'Remarks' && data.title != 'Quantity' && data.title !='Quality Details'">
        <div class="row  p-2 mx-0">
          <div class="col-12 mt-2 mr-1">
            <p class="mb-0 py-0 text-black">{{data.body}}</p>
            <mat-form-field class="mb-0 w-100" appearance="outline">
              <input matInput formControlName="remarks">
            </mat-form-field>
          </div>
        </div>
      </div>
      <div class="mt-2" *ngIf="data.title =='Quantity'  && data.title !='Quality Details'">
        <div class="row  p-2 mx-0">
          <div class="col-12 mt-2 mr-1">
            <p class="mb-0 py-0 text-black">{{data.body}}</p>
            <mat-form-field class="mb-0 w-100" appearance="outline">
              <input matInput formControlName="remarks">
            </mat-form-field>
          </div>
        </div>
      </div>
      <div class="row " style="padding-right: 15px !important;" *ngIf="data.title == 'Quality Details'">
        <p-table #orderManagementTag [value]="orderManagement"
        [globalFilterFields]="['companyDescription','plantDescription','warehouseDescription','partnerCode','tokenNumber','salesOrderNumber', 'actions', 'statusDescription', 'refDocNumber',  'outboundOrderTypeId','lineNumber','itemCode','orderQty','inventoryQty','allocatedQty','requiredDeliveryDate','preOutboundNo','partnerItemBarcode','proposedStorageBin','description']"
        styleClass="p-datatable-gridlines p-datatable-sm" [scrollable]="true" selectionMode="multiple"
        scrollDirection="both" [(selection)]="selectedOrderManagement" scrollHeight="calc(100vh - 29.2rem)"
        sortField="refDocNumber" [sortOrder]="-1" [paginator]="true" [rows]="100" [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [resizableColumns]="true"
        style="width: 100%;margin-left: 10px;background-color:white">
        <ng-template pTemplate="header">
          <tr>
        
    
            <th style="width: 12rem;" pSortableColumn="plantDescription"   pResizableColumn>Anaylsis<p-sortIcon field="plantDescription"></p-sortIcon></th>
            <th style="width: 12rem;" pSortableColumn="warehouseDescription"   pResizableColumn>Impurities<p-sortIcon field="warehouseDescription"></p-sortIcon></th>
        
       


          </tr>

          <tr>
          
        
            <th style="width: 12rem;">
              <input pInputText  type="text" (input)="orderManagementTag.filter($any($event.target)?.value, '[plantDescription]', 'contains')" 
              [value]="$any(orderManagementTag.filters['plantDescription'])?.value" placeholder="Search" class=" w-100 p-column-filter">
            </th>
            <th style="width: 12rem;">
              <input pInputText type="text"
                (input)="orderManagementTag.filter($any($event.target)?.value, 'warehouseDescription', 'contains')"
                [value]="$any(orderManagementTag.filters['warehouseDescription'])?.value" placeholder="Search"
                class=" w-100 p-column-filter">
            </th>
          
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-orderManagement let-rowIndex="rowIndex">
          <tr>

           
         
      
            <td style="width: 12rem;">{{orderManagement.analysis}}</td>
            <td style="width: 12rem;">{{orderManagement.impurities}}</td>
        

          </tr>
        </ng-template>
      </p-table>
  </div>

    </mat-accordion>
    <div class="d-flex justify-content-center align-items-center py-2">
      <button mat-raised-button color="warn" mat-dialog-close class="mx-2" (click)="cancel()"> <i
          class="bi bi-x me-1 font-size-1_5rem"></i>Cancel</button>
      <button mat-raised-button class="mx-2 bg-darkblue text-white" *ngIf="data.title  !='Quality Details'" (click)="submit()"> <i
          class="bi bi-check2 mr-1 font-size-1_5rem"></i>
        Confirm</button>
    </div>
  </div>
</form>
